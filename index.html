<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Inventaris - SIPADES QR KEMUDO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>

<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="text-white fw-bold m-0">SIPADES QR</h4>
            <small class="text-white-50">Desa Kemudo</small>
        </div>
        <ul class="list-unstyled components mt-3">
            <li>
                <a href="dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
            </li>
            <li class="nav-active">
                <a href="index.html"><i class="fa-solid fa-box me-2"></i> Data Inventaris</a>
            </li>
            <li>
                <a href="pemeriksaan.html"><i class="fa-solid fa-clipboard-check me-2"></i> Monitoring Fisik</a>
            </li>
            <li>
                <a href="riwayat.html"><i class="fa-solid fa-history me-2"></i> Audit Log Perubahan</a>
            </li>
            <li class="mt-5">
                <a href="#" onclick="logoutSistem()" class="text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i> Keluar Sesi</a>
            </li>
        </ul>
    </nav>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
            <h5 class="m-0 fw-bold text-secondary"><i class="fa-solid fa-boxes-stacked text-success me-2"></i> Inventaris Aset Desa</h5>
            <div class="bg-light rounded px-3 py-1 text-sm fw-medium text-secondary" id="namaAktorInfo">Memuat Petugas...</div>
        </div>
        
        <div class="card bg-white border-0 shadow-sm text-dark">
            <div class="card-header bg-white py-3 border-0">
                <h6 class="m-0 fw-bold text-success"><i class="fa-solid fa-list me-2"></i>Daftar Registrasi Barang / Logistik</h6>
            </div>
            
            <div class="card-body bg-light border-bottom border-top py-3">
                <div class="row g-2">
                    <div class="col-md-3">
                        <select id="selectKategori" class="form-select form-select-sm" onchange="eksekusiFilterLokal()">
                            <option value="">- Semua Kategori -</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="selectLokasi" class="form-select form-select-sm" onchange="eksekusiFilterLokal()">
                            <option value="">- Semua Lokasi -</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group input-group-sm">
                            <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                            <input type="text" id="inputKataKunci" class="form-control" placeholder="Cari berdasarkan kode aset atau nama barang..." onkeyup="eksekusiFilterLokal()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-3" style="width: 15%;">KODE ASET</th>
                            <th style="width: 25%;">NAMA BARANG</th>
                            <th style="width: 15%;">KATEGORI</th>
                            <th style="width: 15%;">LOKASI</th>
                            <th style="width: 10%;">VOLUME</th>
                            <th style="width: 10%;">KONDISI</th>
                            <th class="text-center" style="width: 10%;">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAsetBody">
                        <tr>
                            <td colspan="7" class="text-center py-5 text-muted">
                                <span class="spinner-border spinner-border-sm me-2" role="status"></span> Membuka data cloud spreadsheet...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // JEMBATAN API REKAYASA LANGSUNG (MURNI PROYEK SAHIRA)
    // =========================================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxqUeddYdvGdVy0MeZycOrle2RysbYo9kns73c7PXhy71RY-oLNZtRFoQ-bgENe_1pF/exec"; 

    async function ambilDataDariCloud(namaSheet) {
        try {
            const respon = await fetch(`${API_URL}?sheet=${namaSheet}`);
            if (!respon.ok) throw new Error("Gagal mengambil data.");
            return await respon.json();
        } catch (eror) {
            console.error("Eror API Ambil Data:", eror);
            return [];
        }
    }

    function logoutSistem() {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
            localStorage.clear();
            window.location.href = "login.html";
        }
    }

    // =========================================================================
    // LOGIKA INVENTARISASI UTAMA
    // =========================================================================
    let dataAsetLokal = [];

    document.addEventListener("DOMContentLoaded", async function() {
        // Bypass protektor sementara agar kamu bisa melihat hasil tabelnya langsung
        const elemenNama = document.getElementById("namaAktorInfo");
        const namaLengkap = localStorage.getItem("sipades_nama") || "Sahira Anindya";
        const role = localStorage.getItem("sipades_role") || "Admin";
        if (elemenNama) {
            elemenNama.innerHTML = `<i class="fa-solid fa-user-tie text-success me-2"></i> ${namaLengkap} (${role})`;
        }

        // Ambil data sheet 'Aset'
        dataAsetLokal = await ambilDataDariCloud("Aset");
        console.log("Data yang berhasil ditarik:", dataAsetLokal);
        
        if (!dataAsetLokal || dataAsetLokal.length === 0 || dataAsetLokal.error) {
            document.getElementById("tabelAsetBody").innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger"><i class="fa-solid fa-triangle-exclamation me-2"></i> Gagal memuat data dari Spreadsheet atau tab 'Aset' kosong.</td></tr>`;
            return;
        }

        const kategoriSelect = document.getElementById("selectKategori");
        const lokasiSelect = document.getElementById("selectLokasi");
        
        // Memetakan kategori & lokasi dengan validasi huruf besar/kecil otomatis
        const daftarKategori = [...new Set(dataAsetLokal.map(x => x.kategori).filter(Boolean))];
        const daftarLokasi = [...new Set(dataAsetLokal.map(x => x.lokasi).filter(Boolean))];
        
        daftarKategori.forEach(k => kategoriSelect.innerHTML += `<option value="${k}">${k}</option>`);
        daftarLokasi.forEach(l => lokasiSelect.innerHTML += `<option value="${l}">${l}</option>`);
        
        renderDataKeTabel(dataAsetLokal);
    });

    function renderDataKeTabel(data) {
        const tbody = document.getElementById("tabelAsetBody");
        tbody.innerHTML = "";
        
        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">Data aset tidak ditemukan atau tidak cocok dengan filter.</td></tr>`;
            return;
        }
        
        data.forEach(barang => {
            // Pengaman data kosong: Jika baris kosong/tidak ada kode aset, lewati agar tidak eror
            if(!barang.kode_aset && !barang.nama_aset) return;

            let statusBadge = "";
            let jenis = barang.jenis_aset ? barang.jenis_aset.trim() : "Individu";
            
            if (jenis === "Kelompok") {
                let baik = parseInt(barang.baik) || 0;
                let rusakRingan = parseInt(barang.rusak_ringan) || 0;
                let rusakBerat = parseInt(barang.rusak_berat) || 0;
                let totalRusak = rusakRingan + rusakBerat;
                
                statusBadge = `<span class="badge bg-light text-dark border">B: ${baik} | R: ${totalRusak}</span>`;
            } else {
                let kondisiAset = barang.kondisi ? barang.kondisi.trim() : "Baik";
                let warnaBadge = kondisiAset === "Baik" ? "bg-primary" : (kondisiAset === "Hilang" ? "bg-danger" : "bg-warning text-dark");
                statusBadge = `<span class="badge ${warnaBadge}">${kondisiAset}</span>`;
            }

            tbody.innerHTML += `<tr>
                <td class="ps-3 fw-bold text-dark">${barang.kode_aset || '-'}</td>
                <td><span class="fw-medium">${barang.nama_aset || '-'}</span></td>
                <td><span class="text-muted text-xs">${barang.kategori || '-'}</span></td>
                <td>${barang.lokasi || '-'}</td>
                <td class="fw-bold">${barang.jumlah_total || '0'} Unit</td>
                <td>${statusBadge}</td>
                <td class="text-center">
                    <a href="detail-aset.html?id=${barang.id}" class="btn btn-sm btn-outline-success py-1 px-2" style="font-size: 11px;">
                        <i class="fa-solid fa-qrcode"></i> Lihat QR
                    </a>
                </td>
            </tr>`;
        });
    }

    function eksekusiFilterLokal() {
        const kategoriDipilih = document.getElementById("selectKategori").value;
        const lokasiDipilih = document.getElementById("selectLokasi").value;
        const kataKunci = document.getElementById("inputKataKunci").value.toLowerCase().trim();
        
        const hasilSaring = dataAsetLokal.filter(barang => {
            const namaAset = barang.nama_aset ? barang.nama_aset.toLowerCase() : "";
            const kodeAset = barang.kode_aset ? barang.kode_aset.toLowerCase() : "";
            
            const cocokKategori = !kategoriDipilih || barang.kategori === kategoriDipilih;
            const cocokLokasi = !lokasiDipilih || barang.lokasi === lokasiDipilih;
            const cocokKataKunci = !kataKunci || 
                                   namaAset.includes(kataKunci) || 
                                   kodeAset.includes(kataKunci);
            
            return cocokKategori && cocokLokasi && cocokKataKunci;
        });
        
        renderDataKeTabel(hasilSaring);
    }
</script>

</body>
</html>
